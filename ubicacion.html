<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ubicación – Panadería Retoño</title>
    <style>
        :root { 
            --cafe-oscuro: #5a2d0c; 
            --fondo-crema: #f3e5ab; 
            --blanco: #ffffff;
            --dorado: #ffcc80;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--fondo-crema);
            color: var(--cafe-oscuro);
            text-align: center;
        }

        header {
            background: linear-gradient(135deg, #5a2d0c, #8d4b20);
            padding: 30px;
            color: white;
        }

        nav a {
            color: var(--dorado);
            text-decoration: none;
            font-weight: bold;
            margin: 0 15px;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        /* Contenedor tipo Tarjeta Blanca similar a las fotos */
        .map-card {
            background-color: var(--blanco);
            border-radius: 35px;
            padding: 20px;
            max-width: 900px;
            margin: 40px auto;
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
        }

        .info-ubicacion {
            margin-bottom: 20px;
        }

        .info-ubicacion h2 {
            margin: 10px 0;
            color: var(--cafe-oscuro);
        }

        /* Contenedor del Mapa */
        .map-container {
            width: 100%;
            height: 450px;
            border-radius: 25px;
            overflow: hidden;
            border: 1px solid #eee;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 0;
        }

        .btn-regresar {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: var(--cafe-oscuro);
            color: white;
            text-decoration: none;
            border-radius: 20px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-regresar:hover {
            transform: scale(1.05);
        }

        /* --- PARCHE RESPONSIVE --- */
        @media (max-width: 650px) {
            .map-card { width: 95%; margin: 20px auto; padding: 15px; }
            .map-container { height: 300px; }
            nav a { margin: 0 5px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>📍 Nuestra Ubicación</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="pedidos.html">Pedidos</a>
        </nav>
    </header>

    <main>
        <div class="map-card">
            <div class="info-ubicacion">
                <h2>Barrio Camilo Torres</h2>
                <p>Cra 28 #4-16, Popayán, Cauca</p>
                <p><strong>¡Te esperamos con el pan más fresco!</strong></p>
            </div>

            <div class="map-container">
                <iframe 
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3986.090623661448!2d-76.62143092579122!3d2.4437299567117176!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8e30030f0030030f%3A0x0!2zMsKwMjYnMzcuNCJOIDc2wrAzNycwNy45Ilc!5e0!3m2!1ses!2sco!4v1712966400000!5m2!1ses!2sco" 
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
            
            <a href="index.html" class="btn-regresar">Volver al Inicio</a>
        </div>
    </main>

    <footer style="margin-bottom: 40px; opacity: 0.6; font-size: 0.8rem;">
        Panadería Retoño – Tradición en Popayán
    </footer>

</body>
</html>
