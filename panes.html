            min-height: 100vh;
        }
        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--cafe-oscuro), var(--cafe-claro));
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-bottom: 5px solid var(--dorado);
            position: relative;
        }
        header::after {
            content: '🌾 🥖 🌾 🥖';
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            font-size: 1.2rem;
            opacity: 0.7;
        }
        h1 { margin: 0; font-size: 2.8rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        nav { margin-top: 25px; }
        nav a {
            margin: 0 18px;
            color: var(--dorado);
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 1px;
        }
        nav a:hover { color: #fff; text-shadow: 0 0 15px var(--dorado); }
        
        h2.seccion-titulo {
            text-align: center;
            margin-top: 50px;
            font-size: 3rem;
            color: var(--cafe-oscuro);
            text-shadow: 1px 1px 0 #fff, 2px 2px 0 var(--cafe-claro);
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            padding: 60px;
        }
        
        .card { 
            background: #fff;
            border-radius: 30px;
            padding: 20px;
            text-align: center; 
            box-shadow: 0 15px 35px rgba(84, 45, 12, 0.15);
            transition: 0.5s ease;
            border: 3px solid #fff;
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-15px);
            border-color: var(--ocre);
        }
        
        .card-img-container {
            width: 100%;
            height: 220px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            background: #f9f9f9;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .card img {
            object-fit: contain; /* Para que el pan no se corte */
            transition: 0.5s;
        }

        /* TAMAÑOS ESPECÍFICOS DEL PAN */
        .pan-pequeno { width: 40%; }
        .pan-mediano { width: 70%; }
        .pan-grande { width: 100%; }

        .card:hover img { transform: scale(1.1); }

        .card h3 { 
            color: var(--cafe-oscuro);
            margin: 10px 0 10px;
            font-size: 1.5rem;
        }
        
        .price-tag {
            background: linear-gradient(135deg, var(--cafe-claro), var(--cafe-oscuro));
            color: #fff;
            display: inline-block;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 2px solid #fff;
        }

        .decoracion-extra {
            position: fixed;
            font-size: 5rem;
            opacity: 0.03;
            z-index: -1;
        }
    </style>
</head>
