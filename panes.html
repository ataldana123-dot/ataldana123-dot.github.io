        }
        header {
            padding: 40px 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--cafe-oscuro), var(--cafe-claro));
            color: #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-bottom: 5px solid var(--dorado);
            position: relative;
        }
        header::after {
            content: '🌾 🥖 🌾 🥖';
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            font-size: 1.2rem;
            opacity: 0.7;
        }
        h1 { margin: 0; font-size: 2.8rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        nav { margin-top: 25px; }
        nav a {
            margin: 0 18px;
            color: var(--dorado);
            text-decoration: none;
            font-weight: 700;
            transition: 0.3s;
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 1px;
        }
        nav a:hover { color: #fff; text-shadow: 0 0 15px var(--dorado); }
        
        h2.seccion-titulo {
            text-align: center;
            margin-top: 50px;
            font-size: 3rem;
            color: var(--cafe-oscuro);
            text-shadow: 1px 1px 0 #fff, 2px 2px 0 var(--cafe-claro);
            position: relative;
            display: inline-block;
            left: 50%;
            transform: translateX(-50%);
        }
        h2.seccion-titulo::before, h2.seccion-titulo::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 100px;
            height: 2px;
            background: var(--cafe-claro);
        }
        h2.seccion-titulo::before { left: -120px; }
        h2.seccion-titulo::after { right: -120px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 40px;
            padding: 60px;
        }
        
        /* Tarjeta Decorada estilo Canva */
        .card { 
            background: #fff;
            border-radius: 30px;
            padding: 20px;
            text-align: center; 
            box-shadow: 0 15px 35px rgba(84, 45, 12, 0.15);
            transition: 0.5s ease;
            border: 3px solid #fff;
            position: relative;
            overflow: hidden;
        }
        /* Decoración de esquina */
        .card::before {
            content: '🥖';
            position: absolute;
            top: -10px;
            right: -10px;
            font-size: 3rem;
            opacity: 0.2;
            transform: rotate(30deg);
        }

        .card:hover {
            transform: translateY(-15px) rotate(2deg);
            box-shadow: 0 25px 50px rgba(84, 45, 12, 0.3);
            border-color: var(--ocre);
        }
        
        .card-img-container {
            width: 100%;
            height: 220px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 5px solid #fff;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.2);
            position: relative;
        }
        /* Trazo orgánico alrededor de la imagen */
        .card-img-container::after {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 2px dashed var(--cafe-claro);
            border-radius: 25px;
            opacity: 0.3;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.5s;
        }
        .card:hover img { transform: scale(1.1); }

        .card h3 { 
            color: var(--cafe-oscuro);
            margin: 10px 0 10px;
            font-size: 1.5rem;
            position: relative;
        }
        
        .card h3::after {
            content: '';
            display: block;
            width: 60px;
            height: 3px;
            background: var(--dorado);
            margin: 8px auto;
            border-radius: 2px;
        }

        .price-tag {
            background: linear-gradient(135deg, var(--cafe-claro), var(--cafe-oscuro));
            color: #fff;
            display: inline-block;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 2px solid #fff;
            transform: rotate(-3deg);
        }
        
        /* Decoraciones de fondo adicionales */
        .decoracion-extra {
            position: fixed;
            font-size: 5rem;
            opacity: 0.03;
            z-index: -1;
        }
    </style>
</head>
