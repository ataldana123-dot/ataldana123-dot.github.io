<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuestros Panes – Panadería Retoño</title>
    <style>
        :root { 
            --cafe-oscuro: #5a2d0c; 
            --cafe-claro: #8d4b20; 
            --crema: #fff3e0; 
            --dorado: #ffe082; 
            --texto: #4a2c1a; 
            --ocre: #e6caa8; 
        }

        body { 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--crema); 
            color: var(--texto);
        }

        header { 
            padding: 40px 20px; 
            text-align: center; 
            background: linear-gradient(135deg, var(--cafe-oscuro), var(--cafe-claro)); 
            color: #fff; 
        }

        nav { margin-top: 20px; }
        nav a { margin: 0 15px; color: var(--dorado); text-decoration: none; font-weight: bold; text-transform: uppercase; }

        .galeria { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
            padding: 40px; 
            max-width: 1200px; 
            margin: auto; 
        }

        .tarjeta-pan { 
            background: white; 
            border-radius: 25px; 
            overflow: hidden; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            text-align: center; 
            padding: 20px;
            transition: 0.3s;
        }

        .tarjeta-pan:hover { transform: translateY(-10px); }

        /* Contenedor para controlar el tamaño visual de las imágenes */
        .img-container {
            height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .tarjeta-pan img { 
            object-fit: contain;
            border-radius: 15px;
        }

        /* Ajustes de tamaño específicos según tu pedido */
        .pan-pequeno { width: 120px; }
        .pan-mediano { width: 180px; }
        .pan-grande { width: 250px; }

        .tarjeta-pan h3 { color: var(--cafe-oscuro); margin: 10px 0; }
        .precio { font-weight: bold; color: var(--cafe-claro); font-size: 1.2rem; }

        .btn-comprar {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background: var(--cafe-oscuro);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>🥖 Nuestros Panes Artesanales</h1>
        <nav>
            <a href="index.html">Inicio</a>
            <a href="pedidos.html">Hacer Pedido</a>
        </nav>
    </header>

    <main class="galeria">
        <div class="tarjeta-pan">
            <div class="img-container">
                <img src="https://as1.ftcdn.net/v2/jpg/04/93/25/28/1000_F_493252871_0T6XqS9ZzJzJzJzJzJzJzJzJzJzJzJzJ.jpg" class="pan-pequeno" alt="Pan barra pequeño">
            </div>
            <h3>Pan Barra Pequeño</h3>
            <p class="precio">$500</p>
            <a href="pedidos.html" class="btn-comprar">Pedir ahora</a>
        </div>

        <div class="tarjeta-pan">
            <div class="img-container">
                <img src="https://as1.ftcdn.net/v2/jpg/04/93/25/28/1000_F_493252871_0T6XqS9ZzJzJzJzJzJzJzJzJzJzJzJzJ.jpg" class="pan-mediano" alt="Pan barra mediano">
            </div>
            <h3>Pan Barra Mediano</h3>
            <p class="precio">$2.000</p>
            <a href="pedidos.html" class="btn-comprar">Pedir ahora</a>
        </div>

        <div class="tarjeta-pan">
            <div class="img-container">
                <img src="https://as1.ftcdn.net/v2/jpg/04/93/25/28/1000_F_493252871_0T6XqS9ZzJzJzJzJzJzJzJzJzJzJzJzJ.jpg" class="pan-grande" alt="Pan barra grande">
            </div>
            <h3>Pan Barra Grande</h3>
            <p class="precio">$3.000</p>
            <a href="pedidos.html" class="btn-comprar">Pedir ahora</a>
        </div>

        <div class="tarjeta-pan">
            <div class="img-container">
                <img src="https://img.freepik.com/foto-gratis/pan-fresco-mesa_144627-25357.jpg" style="width: 180px;" alt="Otros panes">
            </div>
            <h3>Buñuelos Calienticos</h3>
            <p class="precio">$500</p>
            <a href="pedidos.html" class="btn-comprar">Pedir ahora</a>
        </div>
    </main>

    <footer style="text-align: center; padding: 40px; opacity: 0.7;">
        Panadería Retoño © 2026 - Popayán, Cauca
    </footer>

</body>
</html>
