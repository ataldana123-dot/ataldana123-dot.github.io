               color: var(--texto); min-height: 100vh; }
        
        header { padding: 40px 20px; text-align: center; background: linear-gradient(135deg, var(--cafe-oscuro), var(--cafe-claro)); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-bottom: 5px solid var(--verde); position: relative; }
        h1 { margin: 0; font-size: 2.8rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        nav { margin-top: 25px; } nav a { margin: 0 18px; color: var(--dorado); text-decoration: none; font-weight: 700; text-transform: uppercase; font-size: 1rem; }
        
        .container { max-width: 1000px; margin: 50px auto; display: grid; grid-template-columns: 1.3fr 0.7fr; gap: 30px; padding: 20px; position: relative; }
        
        /* Paneles Decorados estilo Canva */
        .panel { 
            background: #fff; padding: 40px; border-radius: 30px; 
            box-shadow: 0 20px 50px rgba(84, 45, 12, 0.15); 
            border: 4px solid #fff; position: relative; transition: 0.3s;
        }
        .panel:hover { border-color: var(--ocre); }
        /* Título decorado dentro del panel */
        .panel h2 { 
            color: var(--cafe-oscuro); font-size: 2rem; margin-bottom: 25px; 
            background: var(--crema); display: inline-block; padding: 5px 20px; border-radius: 15px; border: 2px solid var(--ocre);
        }
        
        select, input { 
            width: 100%; padding: 15px; margin: 15px 0; border-radius: 15px; 
            border: 2px solid #eee; font-size: 1.1rem; box-sizing: border-box; 
            transition: 0.3s;
        }
        select:focus, input:focus { border-color: var(--cafe-claro); outline: none; box-shadow: 0 0 10px rgba(141, 75, 32, 0.2); }
        
        .btn-add { 
            background: linear-gradient(135deg, var(--cafe-claro), var(--cafe-oscuro)); 
            color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; 
            cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: 0.3s; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.2); text-transform: uppercase; letter-spacing: 1px;
        }
        .btn-add:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.3); }
        
        .lista-pedidos { margin-top: 30px; border-top: 2px dashed #eee; padding-top: 20px; }
        .item-pedido { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--crema); padding: 15px; border-radius: 10px; margin-bottom: 10px; 
            border: 1px solid var(--ocre); transition: 0.3s;
        }
        .item-pedido:hover { background: #fff; transform: scale(1.02); }
        .item-pedido span:first-child { font-weight: 600; color: var(--cafe-oscuro); }
        .item-pedido span:last-child { color: var(--cafe-claro); font-weight: bold; }
        
        .total-box { 
            text-align: center; background: linear-gradient(135deg, var(--cafe-oscuro), #3e1f08); 
            color: white; padding: 30px; border-radius: 20px; position: relative; overflow: hidden;
        }
        /* Brillo decorativo */
        .total-box::after { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 70%); }
        
        .total-box h3 { font-size: 1.5rem; margin-bottom: 10px; position: relative; z-index: 1; }
        .total-amount { font-size: 3rem; color: var(--dorado); font-weight: bold; position: relative; z-index: 1; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        
        .btn-whatsapp { 
            display: block; text-align: center; background: linear-gradient(135deg, var(--verde), #128C7E); 
            color: white; text-decoration: none; padding: 20px; border-radius: 15px; 
            font-weight: bold; font-size: 1.3rem; margin-top: 25px; transition: 0.3s; 
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3); text-transform: uppercase;
        }
        .btn-whatsapp:hover { transform: translateY(-5px) scale(1.03); box-shadow: 0 15px 30px rgba(37, 211, 102, 0.5); }
        
        .metodos-pago { font-size: 0.9rem; text-align: center; margin-top: 15px; color: #666; border-top: 1px solid #eee; padding-top: 10px; }
        .metodos-pago img { height: 25px; vertical-align: middle; margin: 0 5px; }

        .decoracion-extra { position: fixed; font-size: 5rem; opacity: 0.03; z-index: -1; }

<body>
    <div class="decoracion-extra" style="top: 20%; left: 3%;">🛍️</div>
    <div class="decoracion-extra" style="bottom: 10%; right: 3%;">💰</div>
    <div class="decoracion-extra" style="top: 50%; right: 10%;">📝</div>

    <header>
        <h1>🌾 Panadería Retoño</h1>
        <nav><a href="index.html">Inicio</a> | <a href="pedidos.html">Refrescar Lista</a></nav>
    </header>

    <div class="container">
        <div class="panel">
            <h2>🛍️ Arma tu Carrito</h2>
            <p style="margin-top:-15px; color: #777; font-size:0.9rem;">Selecciona productos de todas las secciones.</p>
            
            <label>1. Selecciona un producto:</label>
            <select id="producto">
                <optgroup label="🍞 Panes">
                    <option value="500" data-name="Pan barra pequeño">Pan barra pequeño – $500</option>
                    <option value="2000" data-name="Pan barra mediano">Pan barra mediano – $2.000</option>
                    <option value="3000" data-name="Pan barra grande">Pan barra grande – $3.000</option>
                    <option value="300" data-name="Pan agridulce">Pan agridulce – $300</option>
                    <option value="300" data-name="Pan bogotano">Pan bogotano – $300</option>
                    <option value="300" data-name="Rosquillas">Rosquillas – $300</option>
                    <option value="500" data-name="Buñuelos">Buñuelos – $500</option>
                </optgroup>
                <optgroup label="🍪 Galletas">
                    <option value="600" data-name="Galleta de chocolate">Galleta de chocolate – $600</option>
                    <option value="600" data-name="Galleta chispas">Galleta chispas – $600</option>
                </optgroup>
                <optgroup label="🥛 Lácteos">
                    <option value="4000" data-name="Leche Alquería Mediana">Leche Alquería Mediana – $4.000</option>
                    <option value="6000" data-name="Leche Alquería Grande">Leche Alquería Grande – $6.000</option>
                    <option value="5000" data-name="Queso Cuadrado">Queso Cuadrado – $5.000</option>
                    <option value="5500" data-name="Queso Redondo">Queso Redondo – $5.500</option>
                </optgroup>
            </select>
            
            <label>2. Cantidad:</label>
            <input type="number" id="cantidad" value="1" min="1">
            
            <button class="btn-add" onclick="agregarAlPedido()">+ Añadir a mi Lista</button>

            <div class="lista-pedidos" id="lista">
                </div>
        </div>

        <div class="panel" style="position: sticky; top: 20px; height: fit-content;">
            <div class="total-box">
                <h3>Total de tu Pedido</h3>
                <div class="total-amount" id="total">$0 COP</div>
            </div>
            
            <a id="wa-link" class="btn-whatsapp" href="#" onclick="enviarPedido()">
                ✅ Enviar por WhatsApp
            </a>
            
            <div class="metodos-pago">
                Paga en efectivo al recibir o por transferencia:<br>
                <img src="https://upload.wikimedia.org/wikipedia/commons/8/8b/Nequi_Logo.png" alt="Nequi"> Nequi
            </div>
        </div>
    </div>

    <script>
        // Array para guardar los items del carrito
        let carrito = [];
        // Variable para el total general
        let totalGeneral = 0;

        // Función para añadir un producto a la lista
        function agregarAlPedido() {
            // Obtener los elementos HTML
            const selectProducto = document.getElementById('producto');
            const inputCantidad = document.getElementById('cantidad');
            const listaHtml = document.getElementById('lista');
            const totalHtml = document.getElementById('total');

            // Obtener los datos del producto seleccionado
            const opcionSeleccionada = selectProducto.options[selectProducto.selectedIndex];
            const nombreProducto = opcionSeleccionada.getAttribute('data-name');
            const precioProducto = parseInt(opcionSeleccionada.value);
            const cantidad = parseInt(inputCantidad.value);

            // Validar cantidad
            if (cantidad < 1 || isNaN(cantidad)) {
                alert("Por favor, ingresa una cantidad válida.");
                return;
            }

            // Calcular subtotal de este item
            const subtotalItem = precioProducto * cantidad;

            // Actualizar el total general
            totalGeneral += subtotalItem;

            // Guardar en el array del carrito
            carrito.push({
                nombre: nombreProducto,
                cantidad: cantidad,
                subtotal: subtotalItem
            });

            // Crear el HTML para mostrar en la lista
            const nuevoItemHtml = `
                <div class="item-pedido">
                    <span>${cantidad}x ${nombreProducto}</span>
                    <span>$${subtotalItem.toLocaleString('es-CO')}</span>
                </div>
            `;

            // Añadir el item a la lista en el HTML
            listaHtml.innerHTML += nuevoItemHtml;

            // Actualizar el total en el HTML con formato de moneda
            totalHtml.innerText = '$' + totalGeneral.toLocaleString('es-CO') + ' COP';

            // Resetear cantidad a 1 para el siguiente producto
            inputCantidad.value = 1;
        }

        // Función para formatear el mensaje y abrir WhatsApp
        function enviarPedido() {
            // Validar si el carrito está vacío
            if (carrito.length === 0) {
                alert("🛒 Tu carrito está vacío. ¡Agrega deliciosos productos primero!");
                return;
            }

            // Crear el inicio del mensaje
            let mensajeWhatsApp = "¡Hola Panadería Retoño! 🌾🥖 Quiero hacer el siguiente pedido:%0A%0A";

            // Recorrer el carrito y añadir cada producto al mensaje
            carrito.forEach((item, index) => {
                mensajeWhatsApp += `*${index + 1}.* ${item.cantidad}x ${item.nombre} - _($${item.subtotal.toLocaleString('es-CO')})_%0A`;
            });

            // Añadir el total final y métodos de pago
            mensajeWhatsApp += `%0A-------------------------`;
            mensajeWhatsApp += `%0A💰 *TOTAL A PAGAR: $${totalGeneral.toLocaleString('es-CO')} COP*`;
            mensajeWhatsApp += `%0A-------------------------`;
            mensajeWhatsApp += `%0A📍 _Por favor confírmenme disponibilidad y costo de domicilio. ¡Gracias!_`;

            // Reemplazar espacios por %20 para la URL (aunque encodeURIComponent es mejor)
            // mensajeWhatsApp = mensajeWhatsApp.replace(/ /g, "%20");

            // Número de teléfono de la panadería (sin el signo +)
            const numeroTelefono = "3144852155";

            // Crear la URL final de WhatsApp
            const urlFinal = `https://wa.me/${numeroTelefono}?text=${mensajeWhatsApp}`;

            // Abrir la URL en una nueva pestaña
            window.open(urlFinal, '_blank');
        }
    </script>
</body>
