               color: var(--texto); min-height: 100vh; }
        
        header { padding: 40px 20px; text-align: center; background: linear-gradient(135deg, var(--cafe-oscuro), var(--cafe-claro)); color: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-bottom: 5px solid var(--verde); position: relative; }
        h1 { margin: 0; font-size: 2.8rem; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        nav { margin-top: 25px; } nav a { margin: 0 18px; color: var(--dorado); text-decoration: none; font-weight: 700; text-transform: uppercase; font-size: 1rem; }
        
        .container { max-width: 1000px; margin: 50px auto; display: grid; grid-template-columns: 1.3fr 0.7fr; gap: 30px; padding: 20px; position: relative; }
        .panel { background: #fff; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(84, 45, 12, 0.15); border: 4px solid #fff; position: relative; transition: 0.3s; }
        .panel h2 { color: var(--cafe-oscuro); font-size: 2rem; margin-bottom: 25px; background: var(--crema); display: inline-block; padding: 5px 20px; border-radius: 15px; border: 2px solid var(--ocre); }
        
        select, input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 15px; border: 2px solid #eee; font-size: 1.1rem; box-sizing: border-box; transition: 0.3s; }
        .btn-add { background: linear-gradient(135deg, var(--cafe-claro), var(--cafe-oscuro)); color: white; border: none; padding: 18px; width: 100%; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 1.2rem; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.2); text-transform: uppercase; }
        
        .item-pedido { display: flex; justify-content: space-between; align-items: center; background: var(--crema); padding: 15px; border-radius: 10px; margin-bottom: 10px; border: 1px solid var(--ocre); }
        .btn-eliminar { background: var(--rojo); color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer; font-weight: bold; margin-left: 10px; font-size: 0.8rem; }

        .total-box { text-align: center; background: linear-gradient(135deg, var(--cafe-oscuro), #3e1f08); color: white; padding: 30px; border-radius: 20px; position: relative; overflow: hidden; }
        .total-amount { font-size: 3rem; color: var(--dorado); font-weight: bold; position: relative; z-index: 1; }
        
        .btn-whatsapp { display: block; text-align: center; background: linear-gradient(135deg, var(--verde), #128C7E); color: white; text-decoration: none; padding: 20px; border-radius: 15px; font-weight: bold; font-size: 1.3rem; margin-top: 25px; transition: 0.3s; box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3); }

        /* ESTILOS DEL MODAL (VENTANA DE ADVERTENCIA) */
        .modal-overlay {
            display: none; /* Oculto por defecto */
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6); /* Oscurece el fondo */
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px); /* Efecto de desenfoque opcional */
        }
        .modal-content {
            background: #fff;
            padding: 40px;
            border-radius: 25px;
            max-width: 400px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            border: 5px solid var(--ocre);
        }
        .btn-cerrar-modal {
            position: absolute;
            top: 15px; right: 15px;
            background: var(--cafe-oscuro);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px; height: 30px;
            cursor: pointer;
            font-weight: bold;
        }
        .modal-text {
            color: var(--cafe-oscuro);
            font-size: 1.2rem;
            line-height: 1.5;
            font-weight: 600;
        }

</head>
<body>
    <div id="modalError" class="modal-overlay">
        <div class="modal-content">
            <button class="btn-cerrar-modal" onclick="cerrarModal()">X</button>
            <p class="modal-text">
                ⚠️ Lo sentimos, No podemos procesar tu pedido, porque no tienes articulos seleccionados en tu lista ⚠️
            </p>
        </div>
    </div>

    <header>
        <h1>🌾 Panadería Retoño</h1>
        <nav><a href="index.html">Inicio</a> | <a href="pedidos.html">Refrescar Lista</a></nav>
    </header>

    <div class="container">
        <div class="panel">
            <h2>🛍️ Arma tu Carrito</h2>
            <select id="producto">
                <optgroup label="🍞 Panes">
                    <option value="500" data-name="Pan barra pequeño">Pan barra pequeño – $500</option>
                    <option value="2000" data-name="Pan barra mediano">Pan barra mediano – $2.000</option>
                    <option value="3000" data-name="Pan barra grande">Pan barra grande – $3.000</option>
                    <option value="300" data-name="Pan agridulce">Pan agridulce – $300</option>
                    <option value="300" data-name="Pan bogotano">Pan bogotano – $300</option>
                    <option value="300" data-name="Rosquillas">Rosquillas – $300</option>
                    <option value="500" data-name="Buñuelos">Buñuelos – $500</option>
                </optgroup>
                <optgroup label="🍪 Galletas">
                    <option value="600" data-name="Galleta de chocolate">Galleta de chocolate – $600</option>
                    <option value="600" data-name="Galleta chispas">Galleta chispas – $600</option>
                </optgroup>
                <optgroup label="🥛 Lácteos">
                    <option value="4000" data-name="Leche Alquería Mediana">Leche Alquería Mediana – $4.000</option>
                    <option value="6000" data-name="Leche Alquería Grande">Leche Alquería Grande – $6.000</option>
                    <option value="5000" data-name="Queso Cuadrado">Queso Cuadrado – $5.000</option>
                    <option value="5500" data-name="Queso Redondo">Queso Redondo – $5.500</option>
                </optgroup>
            </select>
            <input type="number" id="cantidad" value="1" min="1">
            <button class="btn-add" onclick="agregarAlPedido()">+ Añadir a mi Lista</button>
            <div class="lista-pedidos" id="lista"></div>
        </div>

        <div class="panel" style="position: sticky; top: 20px; height: fit-content;">
            <div class="total-box">
                <h3>Total de tu Pedido</h3>
                <div class="total-amount" id="total">$0 COP</div>
            </div>
            <a id="wa-link" class="btn-whatsapp" href="#" onclick="enviarPedido()">
                ✅ Enviar por WhatsApp
            </a>
        </div>
    </div>

    <script>
        let carrito = [];
        let totalGeneral = 0;

        function agregarAlPedido() {
            const selectProducto = document.getElementById('producto');
            const inputCantidad = document.getElementById('cantidad');
            const opcionSeleccionada = selectProducto.options[selectProducto.selectedIndex];
            const nombreProducto = opcionSeleccionada.getAttribute('data-name');
            const precioProducto = parseInt(opcionSeleccionada.value);
            const cantidad = parseInt(inputCantidad.value);

            if (cantidad < 1 || isNaN(cantidad)) {
                alert("Por favor, ingresa una cantidad válida.");
                return;
            }

            carrito.push({
                id: Date.now(),
                nombre: nombreProducto,
                cantidad: cantidad,
                subtotal: precioProducto * cantidad
            });

            inputCantidad.value = 1;
            actualizarInterfaz();
        }

        function eliminarDelPedido(id) {
            carrito = carrito.filter(item => item.id !== id);
            actualizarInterfaz();
        }

        function actualizarInterfaz() {
            const listaHtml = document.getElementById('lista');
            const totalHtml = document.getElementById('total');
            listaHtml.innerHTML = "";
            totalGeneral = 0;

            carrito.forEach(item => {
                totalGeneral += item.subtotal;
                listaHtml.innerHTML += `
                    <div class="item-pedido">
                        <div><span>${item.cantidad}x ${item.nombre}</span></div>
                        <div style="display:flex; align-items:center;">
                            <span style="color:var(--cafe-claro); font-weight:bold;">$${item.subtotal.toLocaleString('es-CO')}</span>
                            <button class="btn-eliminar" onclick="eliminarDelPedido(${item.id})">X</button>
                        </div>
                    </div>`;
            });
            totalHtml.innerText = '$' + totalGeneral.toLocaleString('es-CO') + ' COP';
        }

        function enviarPedido() {
            if (carrito.length === 0) {
                abrirModal(); // MOSTRAR ADVERTENCIA SI ESTÁ VACÍO
                return;
            }
            let mensaje = "¡Hola Panadería Retoño! 🌾🥖 Quiero hacer el siguiente pedido:%0A%0A";
            carrito.forEach((item, index) => {
                mensaje += `*${index + 1}.* ${item.cantidad}x ${item.nombre} - _($${item.subtotal.toLocaleString('es-CO')})_%0A`;
            });
            mensaje += `%0A💰 *TOTAL: $${totalGeneral.toLocaleString('es-CO')} COP*`;
            window.open(`https://wa.me/3243994536?text=${mensaje}`, '_blank');
        }

        // FUNCIONES DEL MODAL
        function abrirModal() {
            document.getElementById('modalError').style.display = 'flex';
        }
        function cerrarModal() {
            document.getElementById('modalError').style.display = 'none';
        }
    </script>
</body>
</html>
